<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1200 400" width="1200" height="400" role="img"
     aria-label="Gladiator Gauntlet — Where Simple Choices Forge Legendary Victories">

  <defs>

    <!-- Title glow -->
    <filter id="titleGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#c9a84c" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Sword glow -->
    <filter id="swordGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#c9a84c" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gold title gradient -->
    <linearGradient id="goldTitle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0d870"/>
      <stop offset="30%"  stop-color="#c9a84c"/>
      <stop offset="70%"  stop-color="#a07828"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>

    <!-- Center light bloom -->
    <radialGradient id="centerBloom" cx="50%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="rgba(201,168,76,0.07)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Horizontal border gradient -->
    <linearGradient id="borderLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="20%"  stop-color="rgba(201,168,76,0.5)"/>
      <stop offset="50%"  stop-color="rgba(201,168,76,0.9)"/>
      <stop offset="80%"  stop-color="rgba(201,168,76,0.5)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- Sword blade gradients -->
    <linearGradient id="bladeLGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#e8d890"/>
      <stop offset="50%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#6a4a10"/>
    </linearGradient>
    <linearGradient id="bladeRGrad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e8d890"/>
      <stop offset="50%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#6a4a10"/>
    </linearGradient>

    <!-- Clip for banner bounds -->
    <clipPath id="bannerClip">
      <rect width="1200" height="400"/>
    </clipPath>

  </defs>

  <g clip-path="url(#bannerClip)">

    <!-- Center bloom -->
    <rect width="1200" height="400" fill="url(#centerBloom)"/>

    <!-- Top & bottom gold rule lines -->
    <line x1="0" y1="50"  x2="1200" y2="50"  stroke="url(#borderLine)" stroke-width="1"/>
    <line x1="0" y1="350" x2="1200" y2="350" stroke="url(#borderLine)" stroke-width="1"/>

    <!-- ── CROSSED SWORDS ── -->
    <!-- Left sword -->
    <g filter="url(#swordGlow)" opacity="0.82">
      <line x1="420" y1="310" x2="700" y2="100"
            stroke="url(#bladeLGrad)" stroke-width="5" stroke-linecap="round"/>
      <line x1="421" y1="308" x2="699" y2="102"
            stroke="rgba(255,240,180,0.4)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="538" y1="224" x2="498" y2="244"
            stroke="#c9a84c" stroke-width="8" stroke-linecap="round"/>
      <line x1="538" y1="224" x2="578" y2="204"
            stroke="#c9a84c" stroke-width="8" stroke-linecap="round"/>
      <circle cx="415" cy="314" r="9" fill="#c9a84c" stroke="#8a6a20" stroke-width="1.5"/>
      <circle cx="415" cy="314" r="4" fill="#f0d870"/>
      <line x1="420" y1="310" x2="492" y2="248"
            stroke="#6a3a10" stroke-width="7" stroke-linecap="round"/>
      <line x1="432" y1="300" x2="488" y2="254"
            stroke="#8a5a20" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,5"/>
    </g>

    <!-- Right sword -->
    <g filter="url(#swordGlow)" opacity="0.82">
      <line x1="780" y1="310" x2="500" y2="100"
            stroke="url(#bladeRGrad)" stroke-width="5" stroke-linecap="round"/>
      <line x1="779" y1="308" x2="501" y2="102"
            stroke="rgba(255,240,180,0.4)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="662" y1="224" x2="622" y2="204"
            stroke="#c9a84c" stroke-width="8" stroke-linecap="round"/>
      <line x1="662" y1="224" x2="702" y2="244"
            stroke="#c9a84c" stroke-width="8" stroke-linecap="round"/>
      <circle cx="785" cy="314" r="9" fill="#c9a84c" stroke="#8a6a20" stroke-width="1.5"/>
      <circle cx="785" cy="314" r="4" fill="#f0d870"/>
      <line x1="780" y1="310" x2="708" y2="248"
            stroke="#6a3a10" stroke-width="7" stroke-linecap="round"/>
      <line x1="768" y1="300" x2="712" y2="254"
            stroke="#8a5a20" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,5"/>
    </g>

    <!-- Crossing spark -->
    <circle cx="600" cy="200" r="6" fill="#ffee88" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.5;0.9;0.7" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="6;8;5;7;6" dur="1.2s" repeatCount="indefinite"/>
    </circle>

    <!-- ── LAUREL WREATH ── -->
    <g opacity="0.55" fill="#4a6a20" stroke="#6a8a30" stroke-width="0.5">
      <ellipse cx="502" cy="298" rx="14" ry="7" transform="rotate(-40 502 298)"/>
      <ellipse cx="480" cy="282" rx="13" ry="6" transform="rotate(-55 480 282)"/>
      <ellipse cx="462" cy="263" rx="12" ry="6" transform="rotate(-65 462 263)"/>
      <ellipse cx="450" cy="242" rx="11" ry="5" transform="rotate(-75 450 242)"/>
      <ellipse cx="445" cy="220" rx="10" ry="5" transform="rotate(-80 445 220)"/>
      <path d="M520 308 Q490 270 448 215" stroke="#5a7a28" stroke-width="1.5" fill="none"/>
    </g>
    <g opacity="0.55" fill="#4a6a20" stroke="#6a8a30" stroke-width="0.5">
      <ellipse cx="698" cy="298" rx="14" ry="7" transform="rotate(40 698 298)"/>
      <ellipse cx="720" cy="282" rx="13" ry="6" transform="rotate(55 720 282)"/>
      <ellipse cx="738" cy="263" rx="12" ry="6" transform="rotate(65 738 263)"/>
      <ellipse cx="750" cy="242" rx="11" ry="5" transform="rotate(75 750 242)"/>
      <ellipse cx="755" cy="220" rx="10" ry="5" transform="rotate(80 755 220)"/>
      <path d="M680 308 Q710 270 752 215" stroke="#5a7a28" stroke-width="1.5" fill="none"/>
    </g>

    <!-- ── TEXT ── -->
    <text x="600" y="128"
          font-family="'Georgia', 'Times New Roman', serif"
          font-size="13"
          fill="#8a6e2a"
          text-anchor="middle"
          letter-spacing="8">
      ✦ THE ARENA AWAITS ✦
    </text>

    <text x="600" y="215"
          font-family="'Georgia', 'Times New Roman', serif"
          font-size="82"
          font-weight="bold"
          fill="url(#goldTitle)"
          text-anchor="middle"
          letter-spacing="6"
          filter="url(#titleGlow)">
      GLADIATOR
    </text>
    <text x="600" y="270"
          font-family="'Georgia', 'Times New Roman', serif"
          font-size="38"
          font-weight="bold"
          fill="url(#goldTitle)"
          text-anchor="middle"
          letter-spacing="22"
          filter="url(#titleGlow)">
      GAUNTLET
    </text>

    <line x1="380" y1="287" x2="820" y2="287"
          stroke="url(#borderLine)" stroke-width="1" opacity="0.6"/>

    <text x="600" y="318"
          font-family="'Georgia', 'Times New Roman', serif"
          font-size="14"
          font-style="italic"
          fill="#8a7e62"
          text-anchor="middle"
          letter-spacing="2">
      Where Simple Choices Forge Legendary Victories
    </text>

    <circle cx="560" cy="340" r="2" fill="#c9a84c" opacity="0.4"/>
    <circle cx="580" cy="340" r="2" fill="#c9a84c" opacity="0.6"/>
    <circle cx="600" cy="340" r="3" fill="#c9a84c" opacity="0.8"/>
    <circle cx="620" cy="340" r="2" fill="#c9a84c" opacity="0.6"/>
    <circle cx="640" cy="340" r="2" fill="#c9a84c" opacity="0.4"/>

  </g>

</svg>
