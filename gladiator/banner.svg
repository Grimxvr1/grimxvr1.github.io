<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1200 400" width="1200" height="400" role="img"
     aria-label="Gladiator Gauntlet — Where Simple Choices Forge Legendary Victories">

  <defs>

    <!-- Stone texture via feTurbulence -->
    <filter id="stone" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="8" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Subtle grain overlay -->
    <filter id="grain">
      <feTurbulence type="turbulence" baseFrequency="0.9" numOctaves="1" seed="3" result="grainNoise"/>
      <feColorMatrix type="saturate" values="0" in="grainNoise" result="grayGrain"/>
      <feBlend in="SourceGraphic" in2="grayGrain" mode="overlay" result="out"/>
      <feComposite in="out" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Torch glow -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Title glow -->
    <filter id="titleGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#c9a84c" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Sword glow -->
    <filter id="swordGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#c9a84c" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Background gradient: deep stone -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0a0906"/>
      <stop offset="40%"  stop-color="#111009"/>
      <stop offset="100%" stop-color="#0d0b08"/>
    </linearGradient>

    <!-- Gold title gradient -->
    <linearGradient id="goldTitle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0d870"/>
      <stop offset="30%"  stop-color="#c9a84c"/>
      <stop offset="70%"  stop-color="#a07828"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>

    <!-- Vignette radial -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.72)"/>
    </radialGradient>

    <!-- Center light bloom -->
    <radialGradient id="centerBloom" cx="50%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="rgba(201,168,76,0.07)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Torch flame gradient -->
    <radialGradient id="flameL" cx="50%" cy="80%" r="50%">
      <stop offset="0%"   stop-color="#ffdd44" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#ff8800" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#cc2200" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flameR" cx="50%" cy="80%" r="50%">
      <stop offset="0%"   stop-color="#ffdd44" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#ff8800" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#cc2200" stop-opacity="0"/>
    </radialGradient>

    <!-- Torch light cast on background -->
    <radialGradient id="torchLightL" cx="15%" cy="35%" r="28%">
      <stop offset="0%"   stop-color="rgba(201,120,30,0.18)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="torchLightR" cx="85%" cy="35%" r="28%">
      <stop offset="0%"   stop-color="rgba(201,120,30,0.18)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Horizontal border gradient -->
    <linearGradient id="borderLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="20%"  stop-color="rgba(201,168,76,0.5)"/>
      <stop offset="50%"  stop-color="rgba(201,168,76,0.9)"/>
      <stop offset="80%"  stop-color="rgba(201,168,76,0.5)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- Sword blade gradient -->
    <linearGradient id="bladeLGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#e8d890"/>
      <stop offset="50%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#6a4a10"/>
    </linearGradient>
    <linearGradient id="bladeRGrad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e8d890"/>
      <stop offset="50%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#6a4a10"/>
    </linearGradient>

    <!-- Clip for banner bounds -->
    <clipPath id="bannerClip">
      <rect width="1200" height="400"/>
    </clipPath>

    <!-- Torch flicker animation keyframes via animateTransform -->

  </defs>

  <g clip-path="url(#bannerClip)">

    <!-- ── BASE BACKGROUND ── -->
    <rect width="1200" height="400" fill="url(#bgGrad)"/>

    <!-- Stone texture layer -->
    <rect width="1200" height="400" fill="#1a1508" opacity="0.6" filter="url(#stone)"/>

    <!-- Horizontal stone band lines -->
    <line x1="0" y1="80"  x2="1200" y2="80"  stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>

    <!-- Vertical pillar hints -->
    <rect x="0"    y="0" width="60"  height="400" fill="rgba(0,0,0,0.25)"/>
    <rect x="1140" y="0" width="60"  height="400" fill="rgba(0,0,0,0.25)"/>
    <line x1="60"  y1="0" x2="60"  y2="400" stroke="rgba(201,168,76,0.08)" stroke-width="1"/>
    <line x1="1140" y1="0" x2="1140" y2="400" stroke="rgba(201,168,76,0.08)" stroke-width="1"/>

    <!-- Torch light casts -->
    <rect width="1200" height="400" fill="url(#torchLightL)"/>
    <rect width="1200" height="400" fill="url(#torchLightR)"/>

    <!-- Center bloom -->
    <rect width="1200" height="400" fill="url(#centerBloom)"/>

    <!-- ── DECORATIVE BORDERS ── -->
    <rect x="0" y="0" width="1200" height="400" fill="none" stroke="rgba(201,168,76,0.25)" stroke-width="2"/>
    <rect x="8" y="8" width="1184" height="384" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="1"/>

    <!-- Top & bottom gold rule lines -->
    <line x1="0" y1="50"  x2="1200" y2="50"  stroke="url(#borderLine)" stroke-width="1"/>
    <line x1="0" y1="350" x2="1200" y2="350" stroke="url(#borderLine)" stroke-width="1"/>

    <!-- Corner ornaments -->
    <!-- Top-left -->
    <g opacity="0.6">
      <line x1="20" y1="20" x2="80" y2="20" stroke="#c9a84c" stroke-width="1.5"/>
      <line x1="20" y1="20" x2="20" y2="80" stroke="#c9a84c" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="3" fill="#c9a84c"/>
    </g>
    <!-- Top-right -->
    <g opacity="0.6">
      <line x1="1180" y1="20" x2="1120" y2="20" stroke="#c9a84c" stroke-width="1.5"/>
      <line x1="1180" y1="20" x2="1180" y2="80" stroke="#c9a84c" stroke-width="1.5"/>
      <circle cx="1180" cy="20" r="3" fill="#c9a84c"/>
    </g>
    <!-- Bottom-left -->
    <g opacity="0.6">
      <line x1="20" y1="380" x2="80" y2="380" stroke="#c9a84c" stroke-width="1.5"/>
      <line x1="20" y1="380" x2="20" y2="320" stroke="#c9a84c" stroke-width="1.5"/>
      <circle cx="20" cy="380" r="3" fill="#c9a84c"/>
    </g>
    <!-- Bottom-right -->
    <g opacity="0.6">
      <line x1="1180" y1="380" x2="1120" y2="380" stroke="#c9a84c" stroke-width="1.5"/>
      <line x1="1180" y1="380" x2="1180" y2="320" stroke="#c9a84c" stroke-width="1.5"/>
      <circle cx="1180" cy="380" r="3" fill="#c9a84c"/>
    </g>

    <!-- ── LEFT TORCH ── -->
    <g transform="translate(155, 60)">
      <!-- Torch handle -->
      <rect x="-5" y="60" width="10" height="90" rx="2"
            fill="#3a2510" stroke="#6a4a20" stroke-width="1"/>
      <!-- Wrapping -->
      <line x1="-5" y1="80"  x2="5" y2="85"  stroke="#8a6030" stroke-width="1.5"/>
      <line x1="-5" y1="95"  x2="5" y2="100" stroke="#8a6030" stroke-width="1.5"/>
      <line x1="-5" y1="110" x2="5" y2="115" stroke="#8a6030" stroke-width="1.5"/>
      <!-- Torch head -->
      <ellipse cx="0" cy="58" rx="9" ry="7" fill="#5a3010"/>
      <!-- Flame body -->
      <ellipse cx="0" cy="35" rx="16" ry="28" fill="url(#flameL)" opacity="0.9">
        <animate attributeName="rx" values="16;13;17;12;16" dur="0.8s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="28;32;26;30;28" dur="0.8s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="35;32;37;31;35" dur="0.8s" repeatCount="indefinite"/>
      </ellipse>
      <!-- Inner bright flame -->
      <ellipse cx="1" cy="42" rx="7" ry="14" fill="#ffee88" opacity="0.7">
        <animate attributeName="cx" values="1;-1;2;0;1" dur="0.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.9;0.6;0.8;0.7" dur="0.6s" repeatCount="indefinite"/>
      </ellipse>
      <!-- Glow halo -->
      <ellipse cx="0" cy="30" rx="30" ry="35" fill="#ff8800" opacity="0.08" filter="url(#glow)">
        <animate attributeName="opacity" values="0.08;0.14;0.07;0.12;0.08" dur="0.9s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- ── RIGHT TORCH ── -->
    <g transform="translate(1045, 60)">
      <rect x="-5" y="60" width="10" height="90" rx="2"
            fill="#3a2510" stroke="#6a4a20" stroke-width="1"/>
      <line x1="-5" y1="80"  x2="5" y2="85"  stroke="#8a6030" stroke-width="1.5"/>
      <line x1="-5" y1="95"  x2="5" y2="100" stroke="#8a6030" stroke-width="1.5"/>
      <line x1="-5" y1="110" x2="5" y2="115" stroke="#8a6030" stroke-width="1.5"/>
      <ellipse cx="0" cy="58" rx="9" ry="7" fill="#5a3010"/>
      <ellipse cx="0" cy="35" rx="16" ry="28" fill="url(#flameR)" opacity="0.9">
        <animate attributeName="rx" values="16;14;18;13;16" dur="0.75s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="28;31;25;32;28" dur="0.75s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="35;33;36;32;35" dur="0.75s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="-1" cy="42" rx="7" ry="14" fill="#ffee88" opacity="0.7">
        <animate attributeName="cx" values="-1;1;-2;0;-1" dur="0.65s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.85;0.65;0.9;0.7" dur="0.65s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="30" rx="30" ry="35" fill="#ff8800" opacity="0.08" filter="url(#glow)">
        <animate attributeName="opacity" values="0.08;0.13;0.09;0.11;0.08" dur="0.85s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- ── CROSSED SWORDS ── -->
    <!-- Left sword (leaning right, point upper-right) -->
    <g filter="url(#swordGlow)" opacity="0.82">
      <!-- Blade L -->
      <line x1="420" y1="310" x2="700" y2="100"
            stroke="url(#bladeLGrad)" stroke-width="5" stroke-linecap="round"/>
      <!-- Blade edge highlight -->
      <line x1="421" y1="308" x2="699" y2="102"
            stroke="rgba(255,240,180,0.4)" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Guard L -->
      <line x1="538" y1="224" x2="498" y2="244"
            stroke="#c9a84c" stroke-width="8" stroke-linecap="round"/>
      <line x1="538" y1="224" x2="578" y2="204"
            stroke="#c9a84c" stroke-width="8" stroke-linecap="round"/>
      <!-- Pommel L -->
      <circle cx="415" cy="314" r="9" fill="#c9a84c" stroke="#8a6a20" stroke-width="1.5"/>
      <circle cx="415" cy="314" r="4" fill="#f0d870"/>
      <!-- Grip L -->
      <line x1="420" y1="310" x2="492" y2="248"
            stroke="#6a3a10" stroke-width="7" stroke-linecap="round"/>
      <line x1="432" y1="300" x2="488" y2="254"
            stroke="#8a5a20" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,5"/>
    </g>

    <!-- Right sword (leaning left, point upper-left) -->
    <g filter="url(#swordGlow)" opacity="0.82">
      <!-- Blade R -->
      <line x1="780" y1="310" x2="500" y2="100"
            stroke="url(#bladeRGrad)" stroke-width="5" stroke-linecap="round"/>
      <!-- Blade edge highlight -->
      <line x1="779" y1="308" x2="501" y2="102"
            stroke="rgba(255,240,180,0.4)" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Guard R -->
      <line x1="662" y1="224" x2="622" y2="204"
            stroke="#c9a84c" stroke-width="8" stroke-linecap="round"/>
      <line x1="662" y1="224" x2="702" y2="244"
            stroke="#c9a84c" stroke-width="8" stroke-linecap="round"/>
      <!-- Pommel R -->
      <circle cx="785" cy="314" r="9" fill="#c9a84c" stroke="#8a6a20" stroke-width="1.5"/>
      <circle cx="785" cy="314" r="4" fill="#f0d870"/>
      <!-- Grip R -->
      <line x1="780" y1="310" x2="708" y2="248"
            stroke="#6a3a10" stroke-width="7" stroke-linecap="round"/>
      <line x1="768" y1="300" x2="712" y2="254"
            stroke="#8a5a20" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,5"/>
    </g>

    <!-- Crossing spark at center -->
    <circle cx="600" cy="200" r="6" fill="#ffee88" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.5;0.9;0.7" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="6;8;5;7;6" dur="1.2s" repeatCount="indefinite"/>
    </circle>

    <!-- ── LAUREL WREATH (simplified geometric) ── -->
    <!-- Left branch -->
    <g opacity="0.55" fill="#4a6a20" stroke="#6a8a30" stroke-width="0.5">
      <!-- Leaves going up-right from bottom-center -->
      <ellipse cx="502" cy="298" rx="14" ry="7" transform="rotate(-40 502 298)"/>
      <ellipse cx="480" cy="282" rx="13" ry="6" transform="rotate(-55 480 282)"/>
      <ellipse cx="462" cy="263" rx="12" ry="6" transform="rotate(-65 462 263)"/>
      <ellipse cx="450" cy="242" rx="11" ry="5" transform="rotate(-75 450 242)"/>
      <ellipse cx="445" cy="220" rx="10" ry="5" transform="rotate(-80 445 220)"/>
      <!-- Stem -->
      <path d="M520 308 Q490 270 448 215" stroke="#5a7a28" stroke-width="1.5" fill="none"/>
    </g>
    <!-- Right branch -->
    <g opacity="0.55" fill="#4a6a20" stroke="#6a8a30" stroke-width="0.5">
      <ellipse cx="698" cy="298" rx="14" ry="7" transform="rotate(40 698 298)"/>
      <ellipse cx="720" cy="282" rx="13" ry="6" transform="rotate(55 720 282)"/>
      <ellipse cx="738" cy="263" rx="12" ry="6" transform="rotate(65 738 263)"/>
      <ellipse cx="750" cy="242" rx="11" ry="5" transform="rotate(75 750 242)"/>
      <ellipse cx="755" cy="220" rx="10" ry="5" transform="rotate(80 755 220)"/>
      <path d="M680 308 Q710 270 752 215" stroke="#5a7a28" stroke-width="1.5" fill="none"/>
    </g>

    <!-- ── VIGNETTE OVERLAY ── -->
    <rect width="1200" height="400" fill="url(#vignette)"/>

    <!-- ── TEXT ── -->
    <!-- Eyebrow label -->
    <text x="600" y="128"
          font-family="'Georgia', 'Times New Roman', serif"
          font-size="13"
          fill="#8a6e2a"
          text-anchor="middle"
          letter-spacing="8">
      ✦ THE ARENA AWAITS ✦
    </text>

    <!-- Main title -->
    <text x="600" y="215"
          font-family="'Georgia', 'Times New Roman', serif"
          font-size="82"
          font-weight="bold"
          fill="url(#goldTitle)"
          text-anchor="middle"
          letter-spacing="6"
          filter="url(#titleGlow)">
      GLADIATOR
    </text>
    <text x="600" y="270"
          font-family="'Georgia', 'Times New Roman', serif"
          font-size="38"
          font-weight="bold"
          fill="url(#goldTitle)"
          text-anchor="middle"
          letter-spacing="22"
          filter="url(#titleGlow)">
      GAUNTLET
    </text>

    <!-- Rule line under title -->
    <line x1="380" y1="287" x2="820" y2="287"
          stroke="url(#borderLine)" stroke-width="1" opacity="0.6"/>

    <!-- Subtitle -->
    <text x="600" y="318"
          font-family="'Georgia', 'Times New Roman', serif"
          font-size="14"
          font-style="italic"
          fill="#8a7e62"
          text-anchor="middle"
          letter-spacing="2">
      Where Simple Choices Forge Legendary Victories
    </text>

    <!-- Bottom decorative dots -->
    <circle cx="560" cy="340" r="2" fill="#c9a84c" opacity="0.4"/>
    <circle cx="580" cy="340" r="2" fill="#c9a84c" opacity="0.6"/>
    <circle cx="600" cy="340" r="3" fill="#c9a84c" opacity="0.8"/>
    <circle cx="620" cy="340" r="2" fill="#c9a84c" opacity="0.6"/>
    <circle cx="640" cy="340" r="2" fill="#c9a84c" opacity="0.4"/>

    <!-- Grain overlay for final texture -->
    <rect width="1200" height="400" fill="#8a7040" opacity="0.04" filter="url(#grain)"/>

  </g>

</svg>
